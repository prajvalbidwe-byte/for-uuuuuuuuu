<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nishika 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
    min-height:100vh;
    background:linear-gradient(135deg,#ffe6f0,#fff);
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Card */
.container {
    text-align:center;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(255,105,180,0.3);
    width:90%;
    max-width:400px;
    z-index:2;
}

h1 { font-size:1.5rem; color:#e91e63; }
h2 { font-size:1.2rem; }
.name { color:#ff1493; font-weight:700; }

button {
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    background:linear-gradient(45deg,#ff69b4,#ff1493);
    color:white;
    border-radius:25px;
}

/* Flower animation */
.flowers span {
    position:absolute;
    animation:fall linear infinite;
}

@keyframes fall {
    0% { transform:translateY(-10vh) rotate(0); }
    100% { transform:translateY(110vh) rotate(360deg); }
}

/* Fireworks */
.firework {
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#ff1493;
    animation:explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform:translate(var(--x), var(--y));
        opacity:0;
    }
}

/* Big message */
.final {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:2rem;
    color:#ff1493;
    font-weight:bold;
    display:none;
    text-shadow:0 0 20px pink;
}

</style>
</head>

<body>

<div class="flowers" id="flowers"></div>
<div class="final" id="finalMsg">💖 NISHIKA 💖</div>

<div class="container">
    <h1>🌸 Happy National Flowers Day 2026 🌸</h1>
    <h2>For <span class="name">NISHIKA</span></h2>

    <button onclick="insaneMode()">Tap for Surprise 💌</button>
</div>

<script>

let intensity = 10;
let taps = 0;

const flowers = document.getElementById("flowers");
const flowerSymbols = ["🌸","🌷","🌹","🌺","💮"];

/* MAIN BUTTON */
function insaneMode() {
    taps++;

    /* FLOWER RAIN */
    for (let i=0;i<intensity;i++){
        let span=document.createElement("span");
        span.innerHTML=flowerSymbols[Math.floor(Math.random()*flowerSymbols.length)];

        span.style.left=Math.random()*100+"vw";
        span.style.fontSize=(12+Math.random()*15)+"px";
        span.style.animationDuration=(2+Math.random()*3)+"s";

        flowers.appendChild(span);

        setTimeout(()=>span.remove(),5000);
    }

    intensity += 15;

    /* HEART BURST after 2 taps */
    if(taps==2) createHeart();

    /* FIREWORKS after 3 taps */
    if(taps>=3) createFireworks();

    /* FINAL MAGIC after 5 taps */
    if(taps==5) showFinal();
}

/* HEART SHAPE */
function createHeart(){
    for(let i=0;i<50;i++){
        let span=document.createElement("span");
        span.innerHTML="🌸";

        let angle = Math.random()*Math.PI*2;
        let radius = 100*(1-Math.sin(angle));

        span.style.position="absolute";
        span.style.left="50%";
        span.style.top="50%";
        span.style.transform=`translate(${radius*Math.cos(angle)}px, ${-radius*Math.sin(angle)}px)`;

        flowers.appendChild(span);

        setTimeout(()=>span.remove(),3000);
    }
}

/* FIREWORKS */
function createFireworks(){
    for(let i=0;i<20;i++){
        let fw=document.createElement("div");
        fw.className="firework";

        fw.style.left="50%";
        fw.style.top="50%";

        let x=(Math.random()-0.5)*300+"px";
        let y=(Math.random()-0.5)*300+"px";

        fw.style.setProperty('--x', x);
        fw.style.setProperty('--y', y);

        document.body.appendChild(fw);

        setTimeout(()=>fw.remove(),1000);
    }
}

/* FINAL MESSAGE */
function showFinal(){
    document.getElementById("finalMsg").style.display="block";
}

</script>

</body>
</html>
